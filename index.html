<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Study Bunny 🌸</title> 
<style> 
:root{ --bg:#fff0f5; --card:#ffffff; --pink:#ffafcc; --lav:#cdb4db; --blue:#bde0fe; --green:#a3b18a; --text:#5c5470; --shadow:0 8px 20px rgba(0,0,0,.08); } 
.dark{ --bg:#2f2a36; --card:#433b4e; --pink:#ffafcc; --lav:#cdb4db; --blue:#8ecae6; --green:#a3b18a; --text:#fff7fb; } 
*{ box-sizing:border-box; font-family: "Trebuchet MS", sans-serif; } 
body{ margin:0; background:var(--bg); color:var(--text); padding:20px; transition:.3s; overflow-x:hidden; } 
.container{ max-width:800px; margin:auto; } 
.card{ background:var(--card); padding:20px; border-radius:24px; box-shadow:var(--shadow); margin-bottom:18px; } 
h1,h2{ margin-top:0; margin-bottom:10px; } 
.header{ text-align:center; } 
.bunny{ font-size:4rem; } 
.quote{ font-style:italic; opacity:.8; } 
.focus-input, .task-input, .settings-input{ width:100%; padding:12px; border:none; border-radius:14px; background:#f7f7f7; margin-top:10px; font-size:1rem; } 
.settings-group{ display: flex; gap: 10px; margin-bottom: 10px; } 
.settings-group div{ flex: 1; } 
.timer{ text-align:center; } 
.time{ font-size:4rem; font-weight:bold; margin:10px 0; } 
.mode{ font-size:1.1rem; margin-bottom:15px; } 
button{ border:none; padding:12px 18px; border-radius:999px; cursor:pointer; margin:4px; font-weight:bold; } 
.start{background:var(--pink);} .pause{background:var(--lav);} .reset{background:var(--blue);} 
.save-btn{background:var(--green); color: white; width: 100%; margin-top: 10px;}
.darkbtn{background:#ddd;} 
.stars{ font-size:1.4rem; text-align:center; } 
.plant-box{ font-size: 3.5rem; margin: 15px 0; }
.task{ display:flex; justify-content:space-between; align-items:center; padding:10px; margin-top:8px; background:rgba(255,255,255,.5); border-radius:12px; } 
.done{ text-decoration:line-through; opacity:.6; } 
.progress{ height:14px; background:#eee; border-radius:999px; overflow:hidden; margin-top:15px; } 
.bar{ height:100%; width:100%; background:linear-gradient( 90deg, var(--pink), var(--lav) ); transition:1s linear; } 
.sparkle{ position:fixed; font-size:24px; pointer-events:none; z-index:9999; animation:float 2s linear forwards; } 
.shop-grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-top: 15px; }
.shop-item{ background: rgba(0,0,0,0.03); border: 2px dashed #ccc; border-radius: 16px; padding: 12px; text-align: center; cursor: pointer; }
.shop-item.unlocked { border-style: solid; border-color: var(--pink); background: rgba(255,175,204,0.1); }
.shop-item .icon { font-size: 2.5rem; display: block; margin-bottom: 4px; }
.shop-item .price { font-size: 0.9rem; color: #777; font-weight: bold; }
@keyframes float{ 
    0%{ opacity:1; transform:translateY(0); } 
    100%{ opacity:0; transform:translateY(-120px); } 
} 
</style> 
</head> 
<body> 
<div class="container"> 
    <div class="card header"> 
        <div class="bunny" id="mainBunny">🐰</div> 
        <h1>Study Bunny</h1> 
        <div class="quote" id="quote"> You don't have to finish it. Just start. 🌷 </div> 
    </div> 
    <div class="card"> 
        <h2>🍓 Today's Focus</h2> 
        <input id="focus" class="focus-input" placeholder="What's the ONE thing you're focusing on today?"> 
    </div> 
    <div class="card timer"> 
        <h2>🌸 Pomodoro</h2> 
        <div class="mode" id="mode"> Focus Session </div> 
        <div class="plant-box" id="plant">🌱</div>
        <div class="time" id="time">25:00</div> 
        <button class="start" onclick="startTimer()">Start</button> 
        <button class="pause" onclick="pauseTimer()">Pause</button> 
        <button class="reset" onclick="resetTimer()">Reset</button> 
        <div class="progress"> 
            <div class="bar" id="bar"></div> 
        </div> 
    </div> 
    <div class="card stars"> ⭐ Stars Earned: <span id="stars">0</span> </div> 
    
    <div class="card">
        <h2>🥕 Bunny Dress-Up Shop</h2>
        <div class="shop-grid" id="shopGrid"></div>
    </div>

    <div class="card">
        <h2>⚙️ Timer Settings</h2>
        <div class="settings-group">
            <div>
                <label>Focus (mins):</label>
                <input type="number" id="workInput" class="settings-input" value="25" min="1">
            </div>
            <div>
                <label>Break (mins):</label>
                <input type="number" id="breakInput" class="settings-input" value="5" min="1">
            </div>
        </div>
        <button class="save-btn" onclick="saveSettings()">Update Timer Settings 🛠️</button>
    </div>
    <div class="card"> 
        <h2>🦋 Tiny Tasks</h2> 
        <input id="taskInput" class="task-input" placeholder="Add a tiny task..."> 
        <button onclick="addTask()"> Add Task ✨ </button> 
        <div id="taskList"></div> 
    </div> 
    <div class="card"> 
        <button class="darkbtn" onclick="toggleDark()"> 🌙 Toggle Dark Mode </button> 
    </div> 
</div> 

<script> 
const quotes = [ 
    "🌷 You don't have to finish it. Just start.", 
    "🦋 Five minutes counts.", 
    "🍓 Progress is progress.", 
    "🐰 One tiny step at a time.", 
    "✨ Done is better than perfect." 
]; 

const shopItems = [
    { id: "classic", icon: "🐰", price: 0, name: "Classic" },
    { id: "fancy", icon: "🎩", price: 3, name: "Gentleman" },
    { id: "royal", icon: "👑", price: 5, name: "Royal Bun" }
];

document.getElementById("quote").textContent = quotes[Math.floor(Math.random()*quotes.length)]; 

let workTime = Number(localStorage.getItem("workTime") || 25) * 60; 
let breakTime = Number(localStorage.getItem("breakTime") || 5) * 60; 
document.getElementById("workInput").value = workTime / 60;
document.getElementById("breakInput").value = breakTime / 60;

let currentTime = workTime; 
let totalTime = workTime; 
let running = false; 
let workMode = true; 
let stars = Number(localStorage.getItem("stars") || 0); 
let unlockedAvatars = JSON.parse(localStorage.getItem("unlockedAvatars") || '["classic"]');
let currentAvatar = localStorage.getItem("currentAvatar") || "🐰";

document.getElementById("stars").textContent = stars; 
document.getElementById("mainBunny").textContent = currentAvatar;
let timer; 

function updateTimer(){ 
    let mins = Math.floor(currentTime/60); 
    let secs = currentTime%60; 
    document.getElementById("time").textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`; 
    let percent = (currentTime/totalTime)*100; 
    document.getElementById("bar").style.width = percent+"%"; 
    updatePlant(percent);
} 

function updatePlant(percent) {
    const plantEl = document.getElementById("plant");
    if (!workMode) { plantEl.textContent = "🌸"; return; }
    if (percent > 60) plantEl.textContent = "🌱";
    else if (percent > 20) plantEl.textContent = "🌿";
    else plantEl.textContent = "🪻";
}

function saveSettings() {
    const wVal = Math.max(1, parseInt(document.getElementById("workInput").value) || 25);
    const bVal = Math.max(1, parseInt(document.getElementById("breakInput").value) || 5);
    localStorage.setItem("workTime", wVal);
    localStorage.setItem("breakTime", bVal);
    workTime = wVal * 60;
    breakTime = bVal * 60;
    resetTimer();
}

function celebrate(){ 
    stars++; 
    localStorage.setItem("stars",stars); 
    document.getElementById("stars").textContent = stars; 
    renderShop();
} 

function startTimer(){ 
    if(running) return; 
    running=true; 
    timer=setInterval(()=>{ 
        currentTime--; 
        if(currentTime<0){ 
            if(workMode){ 
                celebrate(); 
                workMode=false; 
                currentTime=breakTime; 
                totalTime=breakTime; 
                document.getElementById("mode").textContent = "Break Time 🌸"; 
            }else{ 
                workMode=true; 
                currentTime=workTime; 
                totalTime=workTime; 
                document.getElementById("mode").textContent = "Focus Session"; 
            } 
        } 
        updateTimer(); 
    },1000); 
} 

function pauseTimer(){ 
    clearInterval(timer); 
    running=false; 
} 

function resetTimer(){ 
    pauseTimer(); 
    workMode=true; 
    currentTime=workTime; 
    totalTime=workTime; 
    document.getElementById("mode").textContent = "Focus Session"; 
    updateTimer(); 
} 

function renderShop() {
    const grid = document.getElementById("shopGrid");
    grid.innerHTML = "";
    shopItems.forEach(item => {
        const div = document.createElement("div");
        const isUnlocked = unlockedAvatars.includes(item.id);
        div.className = `shop-item ${isUnlocked ? 'unlocked' : ''}`;
        div.innerHTML = `
            <span class="icon">${item.icon}</span>
            <strong>${item.name}</strong>
            <span class="price">${isUnlocked ? 'Owned' : '⭐ ' + item.price}</span>
        `;
        div.onclick = () => handleShopClick(item);
        grid.appendChild(div);
    });
}

function handleShopClick(item) {
    if (unlockedAvatars.includes(item.id)) {
        currentAvatar = item.icon;
        localStorage.setItem("currentAvatar", currentAvatar);
        document.getElementById("mainBunny").textContent = currentAvatar;
    } else {
        if (stars >= item.price) {
            stars -= item.price;
            unlockedAvatars.push(item.id);
            localStorage.setItem("stars", stars);
            localStorage.setItem("unlockedAvatars", JSON.stringify(unlockedAvatars));
            document.getElementById("stars").textContent = stars;
            currentAvatar = item.icon;
            localStorage.setItem("currentAvatar", currentAvatar);
            document.getElementById("mainBunny").textContent = currentAvatar;
            renderShop();
        }
    }
}

function addTask(){ 
    let input= document.getElementById("taskInput"); 
    if(!input.value.trim()) return;
